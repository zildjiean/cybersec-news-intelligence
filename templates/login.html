<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — CyberSec Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{--bg:#09090b;--sf:#18181b;--b:#27272a;--cyan:#60a5fa;--t:#fafafa;--tm:#a1a1aa;--td:#71717a}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Sarabun',sans-serif;background:var(--bg);color:var(--t);
  min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:14px}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% -20%,rgba(96,165,250,.15),transparent),
             radial-gradient(ellipse 60% 60% at 80% 80%,rgba(168,85,247,.08),transparent);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(96,165,250,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0}
.card{position:relative;z-index:1;width:100%;max-width:420px;
  background:rgba(24,24,27,.85);border:1px solid var(--b);border-radius:16px;
  padding:40px;backdrop-filter:blur(12px);box-shadow:0 0 60px rgba(96,165,250,.08)}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,rgba(96,165,250,.2),rgba(168,85,247,.2));
  border:1px solid rgba(96,165,250,.3);display:inline-flex;align-items:center;
  justify-content:center;font-size:22px;color:var(--cyan);
  box-shadow:0 0 20px rgba(96,165,250,.2);margin-bottom:16px}
.logo-title{font-size:20px;font-weight:700;letter-spacing:.03em}
.logo-sub{font-size:12px;color:var(--tm);margin-top:4px}
.step-badge{display:inline-flex;align-items:center;gap:6px;
  background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);
  border-radius:20px;padding:4px 12px;font-size:11px;color:var(--cyan);
  margin-bottom:24px;font-family:'JetBrains Mono',monospace}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--tm);
  margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.field-wrap{position:relative}
.field input{width:100%;padding:10px 14px;background:rgba(39,39,42,.6);
  border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:14px;
  font-family:inherit;outline:none;transition:border .2s}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(96,165,250,.15)}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--td);cursor:pointer;padding:4px;font-size:14px}
.eye:hover{color:var(--t)}
.btn-login{width:100%;padding:12px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;
  font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;
  margin-top:8px;letter-spacing:.03em}
.btn-login:hover{opacity:.9}
.btn-login:active{transform:scale(.98)}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:8px;padding:10px 14px;color:#fca5a5;font-size:13px;
  margin-bottom:16px;display:flex;align-items:center;gap:8px}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--td)}
.footer span{color:rgba(96,165,250,.6)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="fa fa-shield-halved"></i></div>
    <div class="logo-title">CyberSec Intelligence</div>
    <div class="logo-sub">ระบบแปลข่าวความมั่นคงปลอดภัยไซเบอร์</div>
  </div>
  <div style="text-align:center">
    <span class="step-badge"><i class="fa fa-lock"></i>&nbsp;Step 1 / 2 — เข้าสู่ระบบ</span>
  </div>
  {% if error %}
  <div class="error"><i class="fa fa-circle-exclamation"></i>&nbsp;{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" placeholder="ชื่อผู้ใช้" required autofocus/>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="field-wrap">
        <input type="password" name="password" id="pw" autocomplete="current-password" placeholder="รหัสผ่าน" required/>
        <button type="button" class="eye" onclick="togglePw()"><i class="fa fa-eye" id="eyeIco"></i></button>
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="fa fa-arrow-right-to-bracket"></i>&nbsp;เข้าสู่ระบบ</button>
  </form>
  <div class="footer">ขั้นตอนถัดไป: ยืนยัน <span>Google Authenticator OTP</span></div>
</div>
<script>
function togglePw(){const i=document.getElementById('pw'),ico=document.getElementById('eyeIco');
  if(i.type==='password'){i.type='text';ico.className='fa fa-eye-slash'}
  else{i.type='password';ico.className='fa fa-eye'}}
</script>
</body>
</html>
