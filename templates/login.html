<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login – CyberSec Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter','Sarabun',sans-serif;
  background:#09090b;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  color:#fafafa;
}
.card{
  width:100%;max-width:380px;
  background:#09090b;
  border:1px solid #27272a;
  border-radius:12px;
  padding:32px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.logo{
  display:flex;align-items:center;gap:12px;
  margin-bottom:28px;justify-content:center;
}
.logo-icon{
  width:40px;height:40px;
  border-radius:8px;
  background:#18181b;
  border:1px solid #27272a;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fafafa;
}
.logo-title{font-size:14px;font-weight:700;letter-spacing:.05em;color:#fafafa}
.logo-sub{font-size:12px;color:#71717a;margin-top:1px}
h2{font-size:22px;font-weight:700;color:#fafafa;margin-bottom:4px;text-align:center}
.sub{font-size:13px;color:#71717a;text-align:center;margin-bottom:24px}
label{
  display:block;font-size:13px;font-weight:500;
  color:#a1a1aa;margin-bottom:6px;
}
.inp-wrap{position:relative;margin-bottom:16px}
input[type=password],input[type=text]{
  width:100%;padding:10px 40px 10px 12px;
  background:transparent;
  border:1px solid #27272a;
  border-radius:6px;color:#fafafa;font-size:14px;
  font-family:'Inter','Sarabun',sans-serif;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:#3f3f46;box-shadow:0 0 0 2px rgba(63,63,70,.3)}
.eye{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#71717a;cursor:pointer;font-size:14px;
  transition:color .15s;padding:4px;
}
.eye:hover{color:#a1a1aa}
.err{
  padding:10px 12px;
  background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);
  border-radius:6px;font-size:13px;color:#fca5a5;
  display:flex;align-items:center;gap:8px;margin-bottom:16px;
}
button[type=submit]{
  width:100%;padding:10px;border:none;border-radius:6px;
  background:#fafafa;
  color:#09090b;font-size:14px;font-weight:600;
  cursor:pointer;transition:background .15s;
  font-family:'Inter','Sarabun',sans-serif;
  margin-top:4px;
}
button[type=submit]:hover{background:#e4e4e7}
.hint{margin-top:20px;text-align:center;font-size:12px;color:#52525b;
  display:flex;align-items:center;justify-content:center;gap:5px}
hr{border:none;border-top:1px solid #27272a;margin:24px 0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="fa fa-shield-halved"></i></div>
    <div>
      <div class="logo-title">CyberSec Intelligence</div>
      <div class="logo-sub">ระบบแปลข่าว Cybersecurity</div>
    </div>
  </div>
  <hr/>
  <h2>เข้าสู่ระบบ</h2>
  <p class="sub">กรุณาใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
  {% if error %}<div class="err"><i class="fa fa-circle-xmark"></i>{{ error }}</div>{% endif %}
  <form method="POST">
    <label for="pw">รหัสผ่าน</label>
    <div class="inp-wrap">
      <input type="password" id="pw" name="password" placeholder="••••••••" autofocus required/>
      <button type="button" class="eye" onclick="togglePw()"><i class="fa fa-eye" id="eyeIco"></i></button>
    </div>
    <button type="submit"><i class="fa fa-right-to-bracket"></i> เข้าสู่ระบบ</button>
  </form>
  <p class="hint"><i class="fa fa-lock"></i> ระบบเข้ารหัสการสื่อสาร</p>
</div>
<script>
function togglePw(){
  const f=document.getElementById('pw'),i=document.getElementById('eyeIco');
  f.type=f.type==='password'?'text':'password';
  i.className=f.type==='password'?'fa fa-eye':'fa fa-eye-slash';
}
</script>
</body>
</html>
