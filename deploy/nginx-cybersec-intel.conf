# ══════════════════════════════════════════════════════════════
#  Nginx reverse proxy — CyberSec News Intelligence
#
#  วิธีติดตั้ง:
#    sudo cp nginx-cybersec-intel.conf /etc/nginx/sites-available/cybersec-intel
#    sudo ln -s /etc/nginx/sites-available/cybersec-intel /etc/nginx/sites-enabled/
#    sudo nginx -t
#    sudo systemctl reload nginx
#
#  ตัวเลือก:
#    A) HTTP เท่านั้น  → ใช้ server block แรก (บรรทัด 30–70)
#    B) HTTPS + Let's Encrypt → รัน: sudo certbot --nginx -d yourdomain.com
# ══════════════════════════════════════════════════════════════

# ── Rate limiting (ป้องกัน abuse) ────────────────────────────
limit_req_zone $binary_remote_addr zone=cybersec_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=cybersec_web:10m rate=60r/m;

# ── Upstream (Gunicorn) ───────────────────────────────────────
upstream cybersec_app {
    server 127.0.0.1:5055;
    keepalive 32;
}

# ══ HTTP Server ═══════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;

    # เปลี่ยนเป็น domain หรือ IP จริงของ server
    server_name yourdomain.com www.yourdomain.com;
    # ถ้าใช้ IP: server_name 192.168.1.100;

    # ── Redirect HTTP → HTTPS (เปิดใช้เมื่อมี SSL cert) ──────
    # return 301 https://$host$request_uri;

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/cybersec-intel.access.log;
    error_log  /var/log/nginx/cybersec-intel.error.log;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── File upload size (สำหรับ PDF, เพิ่มถ้าจำเป็น) ─────────
    client_max_body_size 20M;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    # ── Static files (serve โดย Nginx โดยตรง เร็วกว่า Flask) ──
    location /static/ {
        alias /opt/cybersec-news-intelligence/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── PDF downloads (serve โดย Nginx โดยตรง) ────────────────
    location /pdfs/ {
        alias /opt/cybersec-news-intelligence/pdfs/;
        internal;  # เข้าได้เฉพาะผ่าน Flask X-Accel-Redirect เท่านั้น
    }

    # ── API endpoints (rate limit เข้มงวดกว่า) ────────────────
    location /api/ {
        limit_req zone=cybersec_api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://cybersec_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout สูงเพราะ LLM translation ใช้เวลา
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # ── Main app ──────────────────────────────────────────────
    location / {
        limit_req zone=cybersec_web burst=20 nodelay;

        proxy_pass         http://cybersec_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }
}

